# Enable Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y

# Enable Bluetooth logging (optional)
CONFIG_BT_DEBUG_LOG=y

# Enable default logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Enable settings (needed for storing bonding info)
CONFIG_SETTINGS=y
CONFIG_SETTINGS_BT=y

# Basic OS configs
CONFIG_MAIN_STACK_SIZE=1024
